# Dependabot keeps dependencies and GitHub Actions patched.
#
# Version updates (below) open scheduled PRs for outdated packages. Security
# updates — the vulnerability-driven PRs that matter most for SOC 2 — are
# enabled separately in the repo's Settings → Code security → "Dependabot
# security updates". Turn that on; it does not live in this file.
#
# Forks inherit this file as-is. No secrets or org-specific config required.
version: 2
updates:
  # npm packages
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps-dev)'
    # Group minor/patch bumps to cut PR noise; majors still arrive individually
    # so breaking changes get reviewed one at a time.
    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: 'production'
        update-types:
          - 'minor'
          - 'patch'
      development-minor-patch:
        applies-to: version-updates
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    # Temporarily held bumps. Each is blocked on an upstream/coordination issue,
    # not a decision to stay behind forever — remove the entry when its
    # condition is met. Security updates still come through for ignored ranges.
    ignore:
      # eslint-plugin-react crashes under ESLint 10 (getFilename is not a
      # function). Remove once the React ESLint plugins support ESLint 10.
      - dependency-name: 'eslint'
        versions: ['>=10']
      # @vitejs/plugin-react 6 imports vite/internal, which needs a Vite major
      # we don't have. Remove when we do the coordinated Vite/Vitest bump.
      - dependency-name: '@vitejs/plugin-react'
        versions: ['>=6']
      # typescript-eslint >8.55 + TypeScript 6 makes no-unnecessary-type-assertion
      # flag ~500 files. Pinned so the rest of the dev-tooling group can flow.
      # Remove and land a dedicated `eslint --fix` PR to adopt the stricter rule.
      - dependency-name: 'typescript-eslint'
        versions: ['>8.55.0']

  # GitHub Actions pinned in .github/workflows/**
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(ci)'
    # Collapse all action bumps — including majors — into a single PR. Action
    # version bumps are low-risk and CI catches regressions, so reviewing them
    # one-per-PR is pure noise (unlike npm majors, which stay individual above).
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - '*'
