name: Secret Scan

# Scans for committed credentials with TruffleHog (free for everyone,
# including org-owned repos — unlike gitleaks-action, which requires a paid
# license for organizations). On PRs it scans the diff; on schedule and manual
# runs it scans the full history (fetch-depth: 0). The job fails when a secret
# is found, so a leaked credential blocks the merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC — full-history sweep
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for diff + scheduled full scans

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.95.5
        with:
          # Report verified secrets and ones TruffleHog cannot verify. Tighten
          # to `--results=verified` if a fork finds the unknown class too noisy.
          extra_args: --results=verified,unknown
